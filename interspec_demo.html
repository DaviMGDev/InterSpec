<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InterSpec Component Demo — Sentinel Design System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/demo.css">
</head>
<body>
  <div id="app"></div>
  <div id="toast-container" aria-live="polite" aria-atomic="true"></div>
  <div id="dialog-overlay" class="overlay hidden" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="dialog-card">
      <div class="dialog-body">
        <p id="dialog-message"></p>
      </div>
      <div class="dialog-footer">
        <button id="dialog-cancel" class="btn btn-secondary">Cancel</button>
        <button id="dialog-confirm" class="btn btn-primary">OK</button>
      </div>
    </div>
  </div>
  <div id="tooltip" class="tooltip hidden" role="tooltip"></div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="assets/tokens.js"></script>
  <script src="assets/demo.js"></script>
</body>
</html>
